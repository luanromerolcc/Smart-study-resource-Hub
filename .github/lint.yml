name: Lint
on: [push]

jobs:
  lint-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 backend/ --max-line-length=120 --exclude=backend/venv,backend/migrations